name: android-ci

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/QiblaNow.*/**'
      - '.github/workflows/android-ci.yml'
      - '.github/workflows/android-cd.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate Android app
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Create secrets props
        shell: pwsh
        run: |
          @"
          <Project>
            <PropertyGroup>
              <MapsApiKey>${{ secrets.MAPS_API_KEY }}</MapsApiKey>
              <AdMobAppId>${{ secrets.ADMOB_APP_ID }}</AdMobAppId>
              <AdMobBannerTest>${{ secrets.ADMOB_BANNER_TEST }}</AdMobBannerTest>
              <AdMobBannerProd>${{ secrets.ADMOB_BANNER_PROD }}</AdMobBannerProd>
            </PropertyGroup>
          </Project>
          "@ | Set-Content -Path src/QiblaNow.App/QiblaNow.App.secrets.props -Encoding UTF8

      - name: Install required workloads
        run: dotnet workload restore src/QiblaNow.App/QiblaNow.App.csproj

      - name: Restore
        run: dotnet restore src/QiblaNow.slnx

      - name: Build Android
        run: dotnet build src/QiblaNow.App/QiblaNow.App.csproj -c Release -f net10.0-android --no-restore

      - name: Publish unsigned AAB
        run: dotnet publish src/QiblaNow.App/QiblaNow.App.csproj -c Release -f net10.0-android -p:AndroidPackageFormats=aab --no-restore

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: qiblanow-android-aab-ci
          path: src/QiblaNow.App/bin/Release/net10.0-android/publish/*.aab
          if-no-files-found: error